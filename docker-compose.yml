version: '3.8'

services:
  island-simulator:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=nature
      - SIM_WIDTH=30
      - SIM_HEIGHT=30
    volumes:
      - ./data/snapshots:/app/data/snapshots

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./scripts/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
